---
- name: Configurar servidores Ubuntu administrados con Ansible
  hosts: docker
  gather_facts: true

  tasks:
    - name: Mostrar el nombre del host
      ansible.builtin.debug:
        msg: "Nombre del host: {{ inventory_hostname }}"

    - name: Mostrar el sistema operativo detectado por Ansible
      ansible.builtin.debug:
        msg: "Sistema operativo detectado: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Crear el directorio principal de la demo
      ansible.builtin.file:
        path: /tmp/ansible-demo
        state: directory
        mode: "0755"

    - name: Crear el archivo info.txt con información dinámica del servidor
      ansible.builtin.copy:
        dest: /tmp/ansible-demo/info.txt
        content: |
          Nombre del servidor: {{ inventory_hostname }}
          Sistema operativo: {{ ansible_distribution }}
        mode: "0644"

    - name: Crear los subdirectorios logs, backup y config
      ansible.builtin.file:
        path: "/tmp/ansible-demo/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - logs
        - backup
        - config

    - name: Mostrar mensaje cuando el sistema operativo detectado sea Ubuntu
      ansible.builtin.debug:
        msg: "Este servidor utiliza Ubuntu."
      when: ansible_distribution == "Ubuntu"
